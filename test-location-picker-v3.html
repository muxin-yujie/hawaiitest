<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地点选择器 - v3 窄长型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .location-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 50px 40px;
        }

        .location-cards {
            display: flex;
            gap: 40px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .location-card {
            flex: 0 0 260px !important;
            width: 260px !important;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .location-card:hover {
            transform: translateY(-10px) !important;
        }

        .location-card.selected {
            transform: translateY(-15px) scale(1.05) !important;
            z-index: 10;
        }

        .card-body {
            position: relative;
            width: 100% !important;
            height: 600px !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(102, 126, 234, 0.4);
            transition: all 0.4s ease;
            border: 3px solid rgba(255, 255, 255, 0.15);
        }

        .location-card.selected .card-body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 20px 50px rgba(240, 147, 251, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card-inner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
        }

        .card-image-section {
            flex: 0 0 45%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-text-section {
            flex: 0 0 55%;
            padding: 20px 22px;
            display: flex;
            align-items: flex-end;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.98) !important;
            color: #667eea;
            padding: 8px 18px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .card-text {
            position: relative;
            z-index: 10;
            color: white;
        }

        .card-title {
            font-size: 20px !important;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            letter-spacing: 0.8px;
        }

        .card-subtitle {
            font-size: 14px !important;
            opacity: 0.95;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }

        .card-check {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.4s ease;
            font-size: 22px;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .location-card.selected .card-check {
            background: rgba(255, 255, 255, 0.98);
            color: #f093fb;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.15);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
            z-index: 100;
            transition: all 0.3s ease;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(1.05);
        }

        .nav-btn.left {
            left: 0;
        }

        .nav-btn.right {
            right: 0;
        }

        .nav-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .nav-btn.disabled:hover {
            background: rgba(255, 255, 255, 0.98);
            color: #667eea;
            transform: translateY(-50%);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .result-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-emoji {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .modal-header {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .modal-body {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .modal-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="location-container">
        <div class="nav-btn left disabled" id="prevBtn" onclick="goPrev()">‹</div>
        
        <div class="location-cards" id="cardsContainer">
            <div class="location-card" onclick="chooseLocation('waikiki', this)">
                <div class="card-check">✓</div>
                <div class="card-body">
                    <div class="card-inner">
                        <div class="card-image-section">
                            <span>🏖️</span>
                            <div class="card-badge">热门</div>
                        </div>
                        <div class="card-text-section">
                            <div class="card-text">
                                <div class="card-title">威基基海滩</div>
                                <div class="card-subtitle">Waikiki Beach</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="location-card" onclick="chooseLocation('diamond', this)">
                <div class="card-check">✓</div>
                <div class="card-body">
                    <div class="card-inner">
                        <div class="card-image-section">
                            <span>🌋</span>
                            <div class="card-badge">必游</div>
                        </div>
                        <div class="card-text-section">
                            <div class="card-text">
                                <div class="card-title">钻石头山</div>
                                <div class="card-subtitle">Diamond Head</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="location-card" onclick="chooseLocation('polynesian', this)">
                <div class="card-check">✓</div>
                <div class="card-body">
                    <div class="card-inner">
                        <div class="card-image-section">
                            <span>🌺</span>
                            <div class="card-badge">文化</div>
                        </div>
                        <div class="card-text-section">
                            <div class="card-text">
                                <div class="card-title">文化中心</div>
                                <div class="card-subtitle">Polynesian Center</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="location-card" onclick="chooseLocation('kulani', this)">
                <div class="card-check">✓</div>
                <div class="card-body">
                    <div class="card-inner">
                        <div class="card-image-section">
                            <span>🤠</span>
                            <div class="card-badge">冒险</div>
                        </div>
                        <div class="card-text-section">
                            <div class="card-text">
                                <div class="card-title">古兰尼牧场</div>
                                <div class="card-subtitle">Kualoa Ranch</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-btn right" id="nextBtn" onclick="goNext()">›</div>
    </div>

    <div class="result-modal" id="resultModal" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-emoji">🎉</div>
            <div class="modal-header" id="modalTitle">选择成功！</div>
            <div class="modal-body" id="modalBody">你将前往威基基海滩，开始你的英语学习之旅！</div>
            <button class="modal-action" onclick="confirmLocation()">出发！✨</button>
        </div>
    </div>

    <script>
        let currentChoice = null;
        let scrollOffset = 0;
        const CARD_WIDTH = 300;
        const MAX_SCROLL = 0;
        const MIN_SCROLL = -600;

        const locations = {
            'waikiki': {
                title: '威基基海滩',
                subtitle: 'Waikiki Beach',
                description: '你将前往威基基海滩，学习冲浪英语和海滩社交用语！\n\n📚 学习内容：\n• 问路和交通\n• 冲浪课程对话\n• 海滩活动交流\n• 点餐和购物',
                emoji: '🏖️'
            },
            'diamond': {
                title: '钻石头山',
                subtitle: 'Diamond Head',
                description: '你将前往钻石头山，学习登山英语和自然描述用语！\n\n📚 学习内容：\n• 登山装备对话\n• 自然景观描述\n• 体力状况表达\n• 拍照留念',
                emoji: '🌋'
            },
            'polynesian': {
                title: '波利尼西亚文化中心',
                subtitle: 'Polynesian Cultural Center',
                description: '你将前往波利尼西亚文化中心，学习文化介绍和表演欣赏用语！\n\n📚 学习内容：\n• 文化历史介绍\n• 传统表演交流\n• 手工艺制作对话\n• 民俗风情了解',
                emoji: '🌺'
            },
            'kulani': {
                title: '古兰尼牧场',
                subtitle: 'Kualoa Ranch',
                description: '你将前往古兰尼牧场，学习牧场体验和冒险活动用语！\n\n📚 学习内容：\n• 骑马指导对话\n• ATV 越野交流\n• 电影取景地介绍\n• 冒险活动表达',
                emoji: '🤠'
            }
        };

        function chooseLocation(id, card) {
            document.querySelectorAll('.location-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            currentChoice = id;
            
            if (navigator.vibrate) navigator.vibrate(50);
            
            setTimeout(() => showResult(), 300);
        }

        function goPrev() {
            scrollOffset += CARD_WIDTH;
            if (scrollOffset > MAX_SCROLL) scrollOffset = MAX_SCROLL;
            updateCards();
        }

        function goNext() {
            scrollOffset -= CARD_WIDTH;
            if (scrollOffset < MIN_SCROLL) scrollOffset = MIN_SCROLL;
            updateCards();
        }

        function updateCards() {
            document.getElementById('cardsContainer').style.transform = `translateX(${scrollOffset}px)`;
            document.getElementById('prevBtn').classList.toggle('disabled', scrollOffset >= MAX_SCROLL);
            document.getElementById('nextBtn').classList.toggle('disabled', scrollOffset <= MIN_SCROLL);
        }

        function showResult() {
            if (!currentChoice) return;
            
            const data = locations[currentChoice];
            document.getElementById('modalTitle').textContent = '选择成功！';
            document.getElementById('modalBody').textContent = data.description;
            document.getElementById('resultModal').classList.add('active');
            
            launchConfetti();
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('resultModal').classList.remove('active');
        }

        function confirmLocation() {
            alert(`即将前往：${locations[currentChoice].title}\n\n在实际游戏中，这里会进入该地点的剧情和英语学习内容！`);
        }

        function launchConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#43e97b', '#38f9d7'];
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.style.position = 'fixed';
                piece.style.width = '10px';
                piece.style.height = '10px';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.top = '-10px';
                piece.style.zIndex = '3000';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(piece);

                const anim = piece.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(720deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1500,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                anim.onfinish = () => piece.remove();
            }
        }

        let startX = 0;
        let endX = 0;

        document.addEventListener('touchstart', e => {
            startX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            endX = e.changedTouches[0].screenX;
            if (startX - endX > 50) goNext();
            else if (endX - startX > 50) goPrev();
        }, { passive: true });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') goPrev();
            else if (e.key === 'ArrowRight') goNext();
            else if (e.key === 'Enter' && currentChoice) showResult();
        });
    </script>
</body>
</html>
