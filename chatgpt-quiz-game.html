<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 ChatGPT 知识大挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f0f0f0;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .image-container {
            position: relative;
            height: 300px;
            overflow: hidden;
            background: #000;
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        .question-container {
            padding: 30px 20px;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .options {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .option-btn {
            padding: 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .option-btn.correct {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
            animation: pulse 0.5s;
        }

        .option-btn.wrong {
            background: #f44336;
            border-color: #f44336;
            color: white;
            animation: shake 0.5s;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .timer-bar {
            height: 4px;
            background: #ff6b6b;
            width: 100%;
            transition: width 1s linear;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .overlay-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            text-align: center;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
        }

        .feedback.correct {
            color: #4CAF50;
        }

        .feedback.wrong {
            color: #f44336;
        }

        .level-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 头部 -->
        <div class="header">
            <h1>🍹 夏威夷酒文化大挑战</h1>
            <p>测试你对夏威夷鸡尾酒的了解程度！</p>
        </div>

        <!-- 游戏信息 -->
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">关卡</div>
                <div class="info-value" id="levelDisplay">1/3</div>
            </div>
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="scoreDisplay">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">时间</div>
                <div class="info-value" id="timerDisplay">30</div>
            </div>
        </div>

        <!-- 图片区域 -->
        <div class="image-container">
            <div class="level-indicator" id="levelIndicator">关卡 1</div>
            <img class="game-image" id="gameImage" src="" alt="游戏背景">
        </div>

        <!-- 计时器 -->
        <div class="timer-bar" id="timerBar"></div>

        <!-- 问题区域 -->
        <div class="question-container">
            <div class="question-text" id="questionText">
                加载中...
            </div>
            <div class="options" id="optionsContainer">
                <!-- 选项将通过 JavaScript 动态生成 -->
            </div>
            <div class="feedback hidden" id="feedback"></div>
        </div>

        <!-- 开始界面 -->
        <div class="overlay" id="startOverlay">
            <div class="overlay-content">
                <h2>🍹 准备好了吗？</h2>
                <p style="margin: 20px 0; color: #666;">
                    共 3 个关卡，15 道题目<br>
                    认识 Scorpion Frozen、Lava Flow、Blue Hawaii<br>
                    每题 45 秒，答对得分<br>
                    题目很简单，放松玩吧！
                </p>
                <button class="btn" onclick="game.startGame()">开始挑战</button>
            </div>
        </div>

        <!-- 结束界面 -->
        <div class="overlay hidden" id="endOverlay">
            <div class="overlay-content">
                <h2>🎉 游戏结束！</h2>
                <p style="margin: 20px 0; color: #666;">你的最终得分是：</p>
                <div style="font-size: 3em; font-weight: bold; color: #667eea; margin: 20px 0;" id="finalScore">0</div>
                <p style="margin: 20px 0; color: #666;" id="finalMessage"></p>
                <button class="btn" onclick="game.restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="chatgpt-quiz-game.js"></script>
</body>
</html>
