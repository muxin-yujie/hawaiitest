<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koa 邂逅场景 - 融合式叙事原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.3);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 25px;
            flex: 1;
            overflow-y: auto;
            background: #f8f5ff;
            background-image: 
                radial-gradient(circle at 30px 30px, rgba(138, 43, 226, 0.05) 2px, transparent 0);
            background-size: 60px 60px;
        }

        /* NPC 消息样式 - 淡粉色背景 */
        .npc-message {
            background: #ffe0ec !important;
            color: #880e4f !important;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.1);
            border: 1px solid #ffc3d9 !important;
            padding: 18px 20px;
            margin-bottom: 15px;
            max-width: 85%;
            animation: slideInLeft 0.4s ease-out;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .npc-header {
            font-size: 0.95em;
            font-weight: 600;
            color: #FF69B4;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.25);
        }

        .npc-content {
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-line;
        }

        .npc-content .upper-scene {
            color: #9c27b0;
            margin-bottom: 0;
            line-height: 1.7;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.25);
            font-size: 14px;
            font-weight: 600;
        }

        .npc-header {
            font-size: 0.95em;
            font-weight: 600;
            color: #FF69B4;
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.25);
        }

        .npc-content {
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-line;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }

        .npc-content .middle-english {
            color: #880e4f;
            font-weight: 400;
            margin: 14px 0 0 0;
            font-size: 15px;
            padding-bottom: 12px;
            border-bottom: none;
            line-height: 1.7;
        }

        .npc-content .middle-chinese {
            color: #666666;
            font-style: italic;
            font-size: 13.5px;
            margin: 0 0 12px 0;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-weight: 400;
            line-height: 1.6;
        }

        .npc-content .lower-scene {
            color: #9c27b0;
            margin-top: 14px;
            padding-top: 14px;
            line-height: 1.7;
            font-size: 14px;
            font-weight: 600;
        }

        /* 玩家输入样式 - 淡蓝色背景 */
        .player-message {
            background: #b3e5fc !important;
            color: #01579b !important;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(64, 196, 255, 0.1);
            border: 1px solid #81d4fa !important;
            padding: 15px;
            margin-bottom: 15px;
            margin-left: auto;
            max-width: 80%;
            animation: slideInRight 0.4s ease-out;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .player-header {
            font-size: 0.9em;
            font-weight: 600;
            color: #0288d1;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(2, 136, 209, 0.2);
            text-align: right;
        }

        .player-content {
            font-size: 15px;
            line-height: 1.6;
        }

        /* 状态面板 */
        .status-panel {
            background: linear-gradient(135deg, #ffc3d9 0%, #c3e6ff 100%);
            color: #c2185b;
            border: 1px solid #ffd6e6;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 14px;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.2);
        }

        .status-panel h4 {
            margin-bottom: 8px;
            color: #c2185b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-panel .status-item {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .status-panel .status-item strong {
            color: #880e4f;
        }

        /* 结局样式 */
        .ending-message {
            background: linear-gradient(135deg, #ffe6ea 0%, #ffd6e0 100%);
            border: 2px solid #FF69B4;
            padding: 20px;
            margin: 20px 0;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        }

        .ending-message h3 {
            color: #FF69B4;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .ending-message p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
        }

        .input-area input:focus {
            border-color: #FF69B4;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.1);
        }

        .input-area button {
            padding: 14px 24px;
            background: #FF69B4;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.3);
        }

        .input-area button:hover {
            background: #FF1493;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 20, 147, 0.4);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 滚动条样式 */
        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏄‍️ Koa 邂逅场景原型</h1>
            <p>融合式叙事系统测试</p>
        </div>

        <div class="content">
            <!-- 状态面板 -->
            <div class="status-panel">
                <h4>📊 冲浪教学进度</h4>
                <div class="status-item">当前步骤：<strong id="currentStep">相遇</strong></div>
                <div class="status-item">是否下水：<strong id="hasEnteredWater">否</strong></div>
                <div class="status-item">尝试站立：<strong id="hasStoodUp">否</strong></div>
            </div>

            <!-- 场景消息容器 -->
            <div id="sceneContainer"></div>

            <!-- 输入区域 -->
            <div class="input-area">
                <input type="text" id="playerInput" placeholder="输入你的回复..." onkeypress="if(event.keyCode===13) handlePlayerInput()">
                <button onclick="handlePlayerInput()" id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 场景状态管理 ==========
        const sceneState = {
            currentStep: 'meeting',      // 当前剧情步骤
            hasEnteredWater: false,      // 是否下水
            hasStoodUp: false,           // 是否成功站立
            stepDialogueCount: 0,        // 当前步骤已经聊了几轮
            maxDialoguesPerStep: 2,      // 每个步骤最多聊几轮（可以调整）
            isRunning: false,
            
            // 剧情步骤定义
            steps: {
                meeting: {
                    name: '相遇',
                    next: 'preparation'
                },
                preparation: {
                    name: '准备',
                    next: 'entering_water'
                },
                entering_water: {
                    name: '下水',
                    next: 'trying_stand'
                },
                trying_stand: {
                    name: '尝试站立',
                    next: 'success'
                },
                success: {
                    name: '成功',
                    next: null  // 最后一步
                }
            },
            
            // 推进到下一步
            nextStep() {
                const current = this.steps[this.currentStep];
                if (current && current.next) {
                    this.currentStep = current.next;
                    this.stepDialogueCount = 0;  // 重置计数器
                    this.updateFlags();
                } else {
                    // 最后一步，增加计数器
                    this.stepDialogueCount++;
                }
            },
            
            // 更新标志
            updateFlags() {
                if (this.currentStep === 'entering_water') {
                    this.hasEnteredWater = true;
                }
                if (this.currentStep === 'trying_stand') {
                    this.hasStoodUp = true;
                }
            },
            
            // 检查是否应该推进剧情
            checkProgress(userReply) {
                // 最后一步自动推进
                if (this.currentStep === 'trying_stand') {
                    return true;
                }
                
                // 检查是否聊够了轮数
                if (this.stepDialogueCount < this.maxDialoguesPerStep) {
                    // 还没聊够，继续当前步骤
                    return false;
                }
                
                // 聊够了，检测是否应该推进（只要不是拒绝就推进）
                const refuseWords = ['no', 'not', "don't", "can't", 'stop', 'wait', '别', '不', '停', '不了', '不要'];
                const isRefuse = refuseWords.some(word => userReply.toLowerCase().includes(word));
                
                return !isRefuse;
            },
            
            // 获取当前应该生成的场景类型
            getSceneType() {
                const sceneMap = {
                    meeting: 'surf_shop_meeting',
                    preparation: 'continue_teaching',
                    entering_water: 'continue_teaching',
                    trying_stand: 'continue_teaching',
                    success: 'exchange_contact'
                };
                return sceneMap[this.currentStep] || 'continue_teaching';
            },
            
            // 更新状态面板
            updateStatusPanel() {
                const stepName = this.steps[this.currentStep]?.name || '未知';
                const dialogueInfo = `第${this.stepDialogueCount + 1}轮 / 最多${this.maxDialoguesPerStep}轮`;
                document.getElementById('currentStep').textContent = `${stepName} (${dialogogueInfo})`;
                document.getElementById('hasEnteredWater').textContent = this.hasEnteredWater ? '✓ 是' : '否';
                document.getElementById('hasStoodUp').textContent = this.hasStoodUp ? '✓ 是' : '否';
            }
        };

        // ========== AI 调用 ==========
        async function callAI(prompt) {
            const API_KEY = 'sk-a0e31c0e743847eea76c53ba20fa985f';
            const API_URL = 'https://api.deepseek.com/chat/completions';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个浪漫小说作家，善于用优美的中文写互动式爱情故事。你的特长是将环境描写、人物动作和对话自然融合，让读者有身临其境的感觉。'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 500,
                        temperature: 0.8
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 错误：${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content.trim();
                
            } catch (error) {
                console.error('AI 调用失败:', error);
                return `⚠️ AI 服务暂时不可用：${error.message}`;
            }
        }

        // ========== 场景生成 ==========
        async function generateScene(sceneType, userReply = null, previousContext = '') {
            // 统一的世界观设定
            const WORLD_SETTING = `
【世界观】
时间线：午后 → 黄昏 → 日落
地点：夏威夷北岸（冲浪店 + 海滩）
氛围：浪漫、温暖、海风、海浪声

【当前时间】根据剧情步骤自动推进：
- meeting/preparation: 午后（阳光明亮）
- entering_water: 黄昏（太阳开始西沉，天空泛橙）
- trying_stand: 日落时分（海面泛着金光）
- success: 日落结束（天边还有余晖）
`;

            const scenePrompts = {
                surf_shop_meeting: `${WORLD_SETTING}

【本场剧情】
当前步骤：meeting（相遇）
时间：午后
地点：冲浪店里
场景：阳光透过百叶窗，店里挂着冲浪板和贝壳风铃

【写作要求】
- 上场景句：Koa 正在做什么，看到你时的反应
- 对话：打招呼 + 邀请冲浪
- 下场景句：店里的环境描写`,

                continue_teaching: `${WORLD_SETTING}

【前情】
${previousContext}

【玩家刚才说】
"${userReply}"

【当前状态】
- 当前步骤：${sceneState.currentStep}
- 第几轮：${sceneState.stepDialogueCount + 1}/${sceneState.maxDialoguesPerStep}

【写作要求】
**第 1 轮**：只回应玩家 + 自然互动（不推进剧情）
**第 2 轮（最后一轮）**：回应玩家 + **主动引导到下一个动作**（关键！）

【示例】
第 1 轮 - 玩家说"板好重"：
✅ "哈哈，习惯就好了。这板是有点分量，不过你拿得挺稳的。"

第 2 轮 - 玩家说"我的手放哪里？"：
✅ "手放中间这里，对，我帮你调整一下。（轻触你的手）好，现在感觉平衡了吗？我们差不多可以下水了。"

第 2 轮 - 玩家说"有点紧张"：
✅ "正常，第一次都这样。来，我扶着你，我们慢慢走下水。准备好了吗？"
`,

                exchange_contact: `${WORLD_SETTING}

【前情】
${previousContext}

【玩家刚才说】
"${userReply}"

【本场剧情】
当前步骤：success（成功）
时间：日落结束，天边还有余晖
地点：坐在沙滩上

【写作要求】
- 上场景句：Koa 看着你，欲言又止
- 对话：试探性邀请（想要联系方式）
- 下场景句：海风 + 远处的海浪声，营造浪漫氛围`,

                goodbye: `${WORLD_SETTING}

【本场剧情】
当前步骤：告别
时间：天色渐暗，第一颗星出现
地点：冲浪店门口

【写作要求】
- 上场景句：Koa 目送你离开
- 对话：温柔告别 + 期待下次
- 下场景句：他的身影在暮色中，留下念想`
            };

            const prompt = scenePrompts[sceneType];
            if (!prompt) {
                throw new Error(`未知场景类型：${sceneType}`);
            }

            return await callAI(prompt);
        }

        // ========== 显示函数 ==========
        function parseAndShowScene(text) {
            const container = document.getElementById('sceneContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'npc-message';
            
            // 用正则提取四个部分
            const upperMatch = text.match(/\[UPPER\]([\s\S]*?)(?=\[ENGLISH\]|$)/);
            const englishMatch = text.match(/\[ENGLISH\]([\s\S]*?)(?=\[CHINESE\]|$)/);
            const chineseMatch = text.match(/\[CHINESE\]([\s\S]*?)(?=\[LOWER\]|$)/);
            const lowerMatch = text.match(/\[LOWER\]([\s\S]*?)$/);
            
            const upperScene = upperMatch ? upperMatch[1].trim() : '';
            const englishText = englishMatch ? englishMatch[1].trim() : '';
            const chineseText = chineseMatch ? chineseMatch[1].trim().replace(/[()（）]/g, '') : '';
            const lowerScene = lowerMatch ? lowerMatch[1].trim() : '';
            
            // 构建 HTML
            let html = `<div class="npc-content">`;
            
            // 上场景句
            if (upperScene) {
                html += `<div class="upper-scene">${upperScene}</div>`;
            }
            
            // 名字标签
            html += `<div class="npc-header">🏄 Koa（科阿）</div>`;
            
            // 英文动作 + 对话
            if (englishText) {
                html += `<div class="middle-english">${englishText}</div>`;
            }
            
            // 中文翻译
            if (chineseText) {
                html += `<div class="middle-chinese">${chineseText}</div>`;
            }
            
            // 下场景句
            if (lowerScene) {
                html += `<div class="lower-scene">${lowerScene}</div>`;
            }
            
            html += `</div>`;
            messageDiv.innerHTML = html;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showPlayerInput(text) {
            const container = document.getElementById('sceneContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'player-message';
            messageDiv.innerHTML = `
                <div class="player-header">👤 你</div>
                <div class="player-content">${text}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // ========== 主逻辑 ==========
        async function handlePlayerInput() {
            const input = document.getElementById('playerInput');
            const sendBtn = document.getElementById('sendBtn');
            const userReply = input.value.trim();

            if (!userReply || sceneState.isRunning) return;

            // 禁用输入
            input.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '生成中...';

            // 显示玩家输入
            showPlayerInput(userReply);

            // 检查是否应该推进剧情
            const shouldProgress = sceneState.checkProgress(userReply);
            
            if (shouldProgress) {
                // 推进到下一步
                sceneState.nextStep();
                sceneState.updateStatusPanel();  // 更新状态面板
                
                // 检查是否到达最后一步
                if (!sceneState.steps[sceneState.currentStep].next) {
                    // 游戏结束，生成告别场景
                    const aiReply = await generateScene('goodbye');
                    parseAndShowScene(aiReply);
                    
                    // 重置游戏
                    input.value = '';
                    input.disabled = false;
                    sendBtn.disabled = false;
                    sendBtn.textContent = '重新开始';
                    sendBtn.onclick = () => location.reload();
                    return;
                }
            } else {
                // 不推进，继续当前步骤
                sceneState.stepDialogueCount++;
                sceneState.updateStatusPanel();
            }

            // 生成 AI 回复（根据当前步骤）
            const sceneType = sceneState.getSceneType();
            const previousContext = `Koa 正在教玩家冲浪，当前步骤：${sceneState.steps[sceneState.currentStep].name}，第${sceneState.stepDialogueCount + 1}轮对话`;
            const aiReply = await generateScene(sceneType, userReply, previousContext);

            // 显示 AI 回复
            parseAndShowScene(aiReply);

            // 恢复输入
            input.value = '';
            input.disabled = false;
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
            input.focus();
        }

        async function endScene(reason, userReply) {
            sceneState.isRunning = true;
            
            const previousContext = `Koa 在冲浪店遇到玩家，正在教她冲浪。`;
            const endingText = await generateScene('goodbye', userReply, previousContext);
            
            // 用简单的方式显示结局
            const container = document.getElementById('sceneContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'ending-message';
            messageDiv.innerHTML = `
                <h3>💕 场景结束</h3>
                <p>${endingText.replace(/\n/g, '<br>')}</p>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            // 记录数据
            const record = {
                sceneType: sceneState.currentScene,
                endTime: new Date().toISOString(),
                dialogueCount: sceneState.dialogueCount,
                relationshipLevel: sceneState.relationshipLevel,
                keyMoments: sceneState.keyMoments,
                ending: reason
            };
            
            console.log('场景结束，记录已保存:', record);
            localStorage.setItem('koaEncounter', JSON.stringify(record));
        }

        // ========== 初始化 ==========
        async function initScene() {
            const container = document.getElementById('sceneContainer');
            container.innerHTML = '';
            
            // 生成开场场景
            const openingScene = await generateScene('surf_shop_meeting');
            
            // 用解析函数显示
            parseAndShowScene(openingScene);
            
            sceneState.startTime = new Date();
            sceneState.updateStatusPanel();
        }

        // 启动
        initScene();
    </script>
</body>
