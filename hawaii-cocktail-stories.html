<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌺 夏威夷酒语故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .story-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin: 20px 0;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .story-card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card-content {
            padding: 30px;
        }

        .card-title {
            font-size: 2em;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        .story-section {
            margin: 20px 0;
            line-height: 1.8;
            color: #333;
        }

        .story-section h3 {
            color: #ff6b6b;
            margin: 25px 0 15px;
            font-size: 1.3em;
        }

        .story-section p {
            margin: 10px 0;
            text-indent: 2em;
        }

        .culture-box {
            background: linear-gradient(135deg, #fff3cd, #ffe69c);
            border-left: 4px solid #ffc107;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }

        .culture-box h4 {
            color: #856404;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .culture-box p {
            color: #856404;
            line-height: 1.8;
        }

        .ingredients-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .ingredient-item {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .ingredient-item:hover {
            transform: scale(1.05);
        }

        .ingredient-icon {
            font-size: 2em;
            display: block;
        }

        .ingredient-name {
            font-size: 0.9em;
            color: #333;
            margin-top: 5px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #ff6b6b;
            transform: scale(1.2);
        }

        .love-quote {
            text-align: center;
            font-style: italic;
            color: #ff6b6b;
            font-size: 1.2em;
            padding: 20px;
            margin: 20px 0;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .nav-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🌺 夏威夷酒语故事</h1>
            <p>每一杯鸡尾酒，都是一个浪漫的故事</p>
        </div>

        <!-- 进度指示 -->
        <div class="progress-dots" id="progressDots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- 故事卡片 -->
        <div class="story-card" id="storyCard">
            <!-- 内容将通过 JavaScript 动态加载 -->
        </div>

        <!-- 导航按钮 -->
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" onclick="game.prevStory()">← 上一篇</button>
            <button class="nav-btn" id="nextBtn" onclick="game.nextStory()">下一篇 →</button>
        </div>

        <!-- 浪漫语录 -->
        <div class="love-quote" id="loveQuote"></div>
    </div>

    <script src="hawaii-cocktail-stories.js"></script>
</body>
</html>
