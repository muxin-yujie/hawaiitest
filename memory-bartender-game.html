<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 记忆调酒师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .game-area {
            padding: 30px 20px;
        }

        .memory-phase {
            text-align: center;
        }

        .memory-image {
            width: 100%;
            max-width: 400px;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid #ff6b6b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin: 0 auto 20px;
        }

        .countdown {
            font-size: 3em;
            font-weight: bold;
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .ingredients-phase {
            display: none;
        }

        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .ingredient-btn {
            padding: 15px;
            border: 3px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .ingredient-btn:hover {
            border-color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ingredient-btn.selected {
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
            border-color: #ff6b6b;
        }

        .ingredient-btn.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .ingredient-btn.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .ingredient-icon {
            font-size: 2em;
            display: block;
            margin-bottom: 5px;
        }

        .ingredient-name {
            font-weight: bold;
            display: block;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .feedback {
            text-align: center;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
        }

        .feedback.success {
            color: #4CAF50;
        }

        .feedback.error {
            color: #f44336;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        .overlay-content h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #f8a5c2);
            transition: width 0.3s ease;
        }

        .instruction {
            text-align: center;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            margin: 20px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <h1>🍹 记忆调酒师</h1>
            <p>记住鸡尾酒，然后选出正确的配料！</p>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">关卡</div>
                <div class="stat-value" id="levelDisplay">1/3</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">正确率</div>
                <div class="stat-value" id="accuracyDisplay">0%</div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area">
            <!-- 记忆阶段 -->
            <div class="memory-phase" id="memoryPhase">
                <h2 style="margin-bottom: 15px; color: #333;"> 仔细观察这杯酒！</h2>
                <img class="memory-image" id="memoryImage" src="" alt="鸡尾酒">
                <div class="countdown" id="countdown">5</div>
                <p style="margin-top: 15px; color: #666;">记住它的名字和特征</p>
            </div>

            <!-- 配料选择阶段 -->
            <div class="ingredients-phase" id="ingredientsPhase">
                <div class="instruction">
                    💡 选择你认为正确的配料（可多选），然后点击"完成"
                </div>
                
                <div class="ingredients-grid" id="ingredientsGrid">
                    <!-- 配料按钮将通过 JavaScript 生成 -->
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="game.clearSelection()">清空选择</button>
                    <button class="btn btn-primary" onclick="game.submitAnswer()">✅ 完成</button>
                </div>

                <div class="feedback hidden" id="feedback"></div>
            </div>
        </div>

        <!-- 开始界面 -->
        <div class="overlay" id="startOverlay">
            <div class="overlay-content">
                <h2>🍹 记忆调酒师</h2>
                <p style="margin: 20px 0; color: #666;">
                    游戏规则：<br>
                    1️⃣ 观察鸡尾酒 5 秒钟<br>
                    2️⃣ 记住它的名字和特征<br>
                    3️⃣ 从配料表中选出正确的配料<br>
                    4️⃣ 挑战 3 款经典夏威夷鸡尾酒！
                </p>
                <button class="btn btn-primary" onclick="game.startGame()">开始游戏</button>
            </div>
        </div>

        <!-- 结束界面 -->
        <div class="overlay hidden" id="endOverlay">
            <div class="overlay-content">
                <h2>🎉 游戏结束！</h2>
                <p style="margin: 20px 0; color: #666;">你的最终成绩：</p>
                <div style="font-size: 3em; font-weight: bold; color: #ff6b6b; margin: 20px 0;" id="finalScore">0</div>
                <p style="margin: 20px 0; color: #666;" id="finalAccuracy"></p>
                <p style="margin: 20px 0; color: #666;" id="finalMessage"></p>
                <button class="btn btn-primary" onclick="game.restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="memory-bartender-game.js"></script>
</body>
</html>
