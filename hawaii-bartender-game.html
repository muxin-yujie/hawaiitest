<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 夏威夷调酒师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }

        .cocktail-display {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .cocktail-image {
            width: 100%;
            max-width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: white;
        }

        .cocktail-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin: 15px 0 10px;
        }

        .cocktail-description {
            font-size: 1em;
            color: #666;
            line-height: 1.6;
        }

        .mixing-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .ingredients-list {
            margin-bottom: 20px;
        }

        .ingredient-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .ingredient-item:hover {
            border-color: #ff6b6b;
            transform: translateX(5px);
        }

        .ingredient-name {
            font-weight: bold;
            color: #333;
        }

        .ingredient-amount {
            color: #666;
            font-size: 0.9em;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #333;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #f8a5c2);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8em;
        }

        .tips-section {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .tips-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
        }

        .tips-content {
            color: #856404;
            line-height: 1.6;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        .overlay-content h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b6b, #f8a5c2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 0);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -100px);
                opacity: 0;
            }
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .culture-note {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <h1>🍹 夏威夷调酒师</h1>
            <p>学习制作经典的夏威夷鸡尾酒！</p>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">关卡</div>
                <div class="stat-value" id="levelDisplay">1/3</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">完成</div>
                <div class="stat-value" id="completedDisplay">0/3</div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area">
            <!-- 鸡尾酒展示 -->
            <div class="cocktail-display">
                <img class="cocktail-image" id="cocktailImage" src="" alt="鸡尾酒">
                <div class="cocktail-name" id="cocktailName">加载中...</div>
                <div class="cocktail-description" id="cocktailDescription"></div>
                
                <!-- 文化小知识 -->
                <div class="culture-note" id="cultureNote"></div>
            </div>

            <!-- 调制面板 -->
            <div class="mixing-panel">
                <h3 style="margin-bottom: 15px; color: #333;">📋 配方</h3>
                <div class="ingredients-list" id="ingredientsList">
                    <!-- 配料将通过 JavaScript 动态生成 -->
                </div>

                <!-- 制作进度 -->
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="game.addIngredient()">➕ 添加配料</button>
                    <button class="action-btn secondary" onclick="game.mixCocktail()">🥄 搅拌</button>
                    <button class="action-btn secondary" onclick="game.addIce()">🧊 加冰</button>
                    <button class="action-btn primary" onclick="game.serveCocktail()">🍸 完成</button>
                </div>

                <!-- 提示区域 -->
                <div class="tips-section hidden" id="tipsSection">
                    <div class="tips-title">💡 调酒小贴士</div>
                    <div class="tips-content" id="tipsContent"></div>
                </div>
            </div>
        </div>

        <!-- 开始界面 -->
        <div class="overlay" id="startOverlay">
            <div class="overlay-content">
                <h2>🍹 欢迎来到夏威夷酒吧！</h2>
                <p style="margin: 20px 0; color: #666;">
                    你将学习制作三款经典夏威夷鸡尾酒：<br>
                    🍹 Mai Tai - 波利尼西亚经典<br>
                    🌋 Lava Flow - 熔岩流分层<br>
                    🌊 Blue Hawaii - 蓝色夏威夷
                </p>
                <button class="btn" onclick="game.startGame()">开始调酒</button>
            </div>
        </div>

        <!-- 完成界面 -->
        <div class="overlay hidden" id="completeOverlay">
            <div class="overlay-content">
                <h2>🎉 恭喜完成！</h2>
                <p style="margin: 20px 0; color: #666;">你已经学会了所有夏威夷鸡尾酒！</p>
                <div style="font-size: 3em; font-weight: bold; color: #ff6b6b; margin: 20px 0;" id="finalScore">0</div>
                <p style="margin: 20px 0; color: #666;" id="finalMessage"></p>
                <button class="btn" onclick="game.restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="hawaii-bartender-game.js?v=2"></script>
</body>
</html>
