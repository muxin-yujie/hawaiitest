<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地点选择器 - 平行四边形</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 平行四边形卡片容器 */
        .parallelogram-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 50px 60px;
        }

        .location-cards {
            display: flex;
            gap: 40px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 平行四边形卡片 */
        .location-card {
            flex: 0 0 350px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .location-card:hover {
            transform: translateY(-10px);
        }

        .location-card.selected {
            transform: translateY(-15px) scale(1.1);
            z-index: 10;
        }

        /* 平行四边形主体 */
        .card-parallelogram {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(102, 126, 234, 0.4);
            transition: all 0.4s ease;
            /* 平行四边形效果 */
            transform: skewX(-8deg);
            border: 3px solid rgba(255, 255, 255, 0.15);
        }

        .location-card.selected .card-parallelogram {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 20px 50px rgba(240, 147, 251, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 卡片内容（反向倾斜保持文字水平） */
        .card-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transform: skewX(8deg);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
        }

        /* 图片区域 */
        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            z-index: 1;
        }

        /* 渐变遮罩 */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 2;
        }

        /* 标签 */
        .card-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.98);
            color: #667eea;
            padding: 8px 18px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
            z-index: 10;
            transform: skewX(-8deg);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        /* 文字内容 */
        .card-text {
            position: relative;
            z-index: 10;
            color: white;
        }

        .card-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            letter-spacing: 0.8px;
        }

        .card-english {
            font-size: 18px;
            opacity: 0.95;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }

        /* 选中指示器 */
        .card-check {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.4s ease;
            transform: skewX(-8deg);
            font-size: 22px;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .location-card.selected .card-check {
            background: rgba(255, 255, 255, 0.98);
            color: #f093fb;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
            transform: skewX(-8deg) scale(1.15);
        }

        /* 导航箭头 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
            z-index: 100;
            transition: all 0.3s ease;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }

        .nav-arrow:hover {
            background: #667eea;
            color: white;
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .nav-arrow:active {
            transform: translateY(-50%) scale(1.05);
        }

        .nav-arrow.left {
            left: 0;
        }

        .nav-arrow.right {
            right: 0;
        }

        .nav-arrow.disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .nav-arrow.disabled:hover {
            background: rgba(255, 255, 255, 0.98);
            color: #667eea;
            transform: translateY(-50%);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
        }

        /* 结果弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .parallelogram-wrapper {
                padding: 20px 30px;
            }

            .location-card {
                flex: 0 0 150px;
            }

            .card-parallelogram {
                height: 200px;
            }

            .card-title {
                font-size: 14px;
            }

            .card-english {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="parallelogram-wrapper">
        <div class="nav-arrow left disabled" id="prevBtn" onclick="navigate(-1)">‹</div>
        
        <div class="location-cards" id="locationCards">
            <!-- 卡片 1: 威基基海滩 -->
            <div class="location-card" onclick="selectCard('waikiki', this)">
                <div class="card-check">✓</div>
                <div class="card-parallelogram">
                    <div class="card-image">
                        <div class="card-overlay"></div>
                        <span>🏖️</span>
                        <div class="card-badge">热门</div>
                    </div>
                    <div class="card-content">
                        <div class="card-text">
                            <div class="card-title">威基基海滩</div>
                            <div class="card-english">Waikiki Beach</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 卡片 2: 钻石头山 -->
            <div class="location-card" onclick="selectCard('diamond-head', this)">
                <div class="card-check">✓</div>
                <div class="card-parallelogram">
                    <div class="card-image">
                        <div class="card-overlay"></div>
                        <span>🌋</span>
                        <div class="card-badge">必游</div>
                    </div>
                    <div class="card-content">
                        <div class="card-text">
                            <div class="card-title">钻石头山</div>
                            <div class="card-english">Diamond Head</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 卡片 3: 波利尼西亚文化中心 -->
            <div class="location-card" onclick="selectCard('polynesian', this)">
                <div class="card-check">✓</div>
                <div class="card-parallelogram">
                    <div class="card-image">
                        <div class="card-overlay"></div>
                        <span>🌺</span>
                        <div class="card-badge">文化</div>
                    </div>
                    <div class="card-content">
                        <div class="card-text">
                            <div class="card-title">文化中心</div>
                            <div class="card-english">Polynesian Center</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 卡片 4: 古兰尼牧场 -->
            <div class="location-card" onclick="selectCard('kulani', this)">
                <div class="card-check">✓</div>
                <div class="card-parallelogram">
                    <div class="card-image">
                        <div class="card-overlay"></div>
                        <span>🤠</span>
                        <div class="card-badge">冒险</div>
                    </div>
                    <div class="card-content">
                        <div class="card-text">
                            <div class="card-title">古兰尼牧场</div>
                            <div class="card-english">Kualoa Ranch</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-arrow right" id="nextBtn" onclick="navigate(1)">›</div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="resultModal" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <div class="modal-title" id="modalTitle">选择成功！</div>
            <div class="modal-desc" id="modalDesc">你将前往威基基海滩，开始你的英语学习之旅！</div>
            <button class="modal-btn" onclick="goToLocation()">出发！✨</button>
        </div>
    </div>

    <script>
        let selectedLocation = null;
        let currentOffset = 0;
        const cardWidth = 390; // 卡片宽度 350px + gap 40px
        const maxOffset = 0;
        const minOffset = -780; // 最多滑动 2 次

        // 地点数据
        const locationData = {
            'waikiki': {
                name: '威基基海滩',
                english: 'Waikiki Beach',
                desc: '你将前往威基基海滩，学习冲浪英语和海滩社交用语！\n\n📚 学习内容：\n• 问路和交通\n• 冲浪课程对话\n• 海滩活动交流\n• 点餐和购物',
                icon: '🏖️'
            },
            'diamond-head': {
                name: '钻石头山',
                english: 'Diamond Head',
                desc: '你将前往钻石头山，学习登山英语和自然描述用语！\n\n📚 学习内容：\n• 登山装备对话\n• 自然景观描述\n• 体力状况表达\n• 拍照留念',
                icon: '🌋'
            },
            'polynesian': {
                name: '波利尼西亚文化中心',
                english: 'Polynesian Cultural Center',
                desc: '你将前往波利尼西亚文化中心，学习文化介绍和表演欣赏用语！\n\n📚 学习内容：\n• 文化历史介绍\n• 传统表演交流\n• 手工艺制作对话\n• 民俗风情了解',
                icon: '🌺'
            },
            'kulani': {
                name: '古兰尼牧场',
                english: 'Kualoa Ranch',
                desc: '你将前往古兰尼牧场，学习牧场体验和冒险活动用语！\n\n📚 学习内容：\n• 骑马指导对话\n• ATV 越野交流\n• 电影取景地介绍\n• 冒险活动表达',
                icon: '🤠'
            }
        };

        function selectCard(locationId, cardElement) {
            // 移除其他卡片的选中状态
            document.querySelectorAll('.location-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 选中当前卡片
            cardElement.classList.add('selected');
            selectedLocation = locationId;

            // 震动反馈（移动端）
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }

            console.log('选中地点:', locationId, locationData[locationId].name);
            
            // 直接显示结果
            setTimeout(() => {
                confirmSelection();
            }, 300);
        }

        function navigate(direction) {
            const cardsContainer = document.getElementById('locationCards');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            currentOffset += direction * cardWidth;
            
            // 限制滚动范围
            if (currentOffset > maxOffset) {
                currentOffset = maxOffset;
            }
            if (currentOffset < minOffset) {
                currentOffset = minOffset;
            }

            cardsContainer.style.transform = `translateX(${currentOffset}px)`;

            // 更新箭头状态
            prevBtn.classList.toggle('disabled', currentOffset >= maxOffset);
            nextBtn.classList.toggle('disabled', currentOffset <= minOffset);
        }

        function confirmSelection() {
            if (!selectedLocation) {
                alert('请先选择一个地点！');
                return;
            }

            const data = locationData[selectedLocation];
            document.getElementById('modalTitle').textContent = `选择成功！`;
            document.getElementById('modalDesc').textContent = data.desc;
            document.getElementById('resultModal').classList.add('show');

            // 庆祝动画
            createConfetti();
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) {
                return;
            }
            document.getElementById('resultModal').classList.remove('show');
        }

        function goToLocation() {
            console.log('前往地点:', selectedLocation);
            alert(`即将前往：${locationData[selectedLocation].name}\n\n在实际游戏中，这里会进入该地点的剧情和英语学习内容！`);
        }

        // 彩带特效
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#43e97b', '#38f9d7'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.zIndex = '3000';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);

                const animation = confetti.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(720deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1500,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                animation.onfinish = () => confetti.remove();
            }
        }

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            
            if (touchStartX - touchEndX > swipeThreshold) {
                // 左滑 - 下一个
                navigate(1);
            } else if (touchEndX - touchStartX > swipeThreshold) {
                // 右滑 - 上一个
                navigate(-1);
            }
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                navigate(-1);
            } else if (e.key === 'ArrowRight') {
                navigate(1);
            } else if (e.key === 'Enter' && selectedLocation) {
                confirmSelection();
            }
        });
    </script>
</body>
</html>
